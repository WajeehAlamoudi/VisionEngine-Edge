rules:
  # ── what rules do ───────────────────────────────────────────────────────────
  # Rules have two jobs:
  #
  #   1. FILTER — define which detections are relevant to this deployment.
  #               Any detection that matches no rule is discarded before analytics.
  #               This is how you scope analytics to what matters:
  #               "only track persons in these zones on these cameras."
  #
  #   2. ALERT  — optionally fire a webhook notification and write an alert row.
  #               Controlled by the `alert` field (default: true).
  #               Set alert: false for rules whose only purpose is filtering —
  #               the detection still flows to analytics, but nothing is sent.
  #
  # If no rules are defined → all detections pass through unfiltered (development mode).
  #
  #
  # Fields:
  #
  #   name              Human-readable label. Shown in logs, alert rows, webhooks.
  #                     Use underscores. Example: person_in_restricted_area
  #
  #   class             Object class to watch. Must exactly match a class name
  #                     in the model used by the target cameras.
  #
  #   cameras           Which camera IDs this rule applies to.
  #                     [] = all cameras (universal convention).
  #                     [cam-01, cam-03] = only those cameras.
  #                     Startup validation warns if a listed camera ID does not exist.
  #
  #   zones             Zone names to watch.
  #                     [] = all zones on the matched cameras.
  #                     [zone_a, zone_b] = detection in ANY of them matches.
  #
  #   min_confidence    Additional confidence floor for this rule only.
  #                     Stacks on top of the camera/model confidence threshold.
  #                     Omit to use the effective camera floor.
  #
  #   cooldown_seconds  After this rule fires an alert on camera X in zone Y,
  #                     suppress further alerts for that same camera+zone for N seconds.
  #                     Does NOT affect filtering — detection still passes to analytics.
  #                     Set to 0 or omit for no cooldown.
  #
  #   alert             true  → rule fires webhook + writes alert row (default)
  #                     false → filter-only — detection passes to analytics silently.
  #                             Use this when you have no alert backend yet, or when
  #                             the rule exists purely to define what's worth tracking.
  #
  #   severity          Written into the alert row. Drives dashboard alert colors.
  #                       critical → red    — immediate action required
  #                       warning  → amber  — attention needed
  #                       info     → blue   — informational
  #
  #   alerts_table      Table where alert rows are inserted (one row per alert fired).
  #                     Row: rule_name, class, camera_id, zone, confidence, severity, message, ts
  #                     Omit to skip writing to the alerts table.
  #                     Has no effect when alert: false.
  #
  #   message           Text written into the alert row and webhook payload.
  #                     Placeholders: {class}, {zone}, {camera}, {confidence}
  #
  #   enabled           false → rule is ignored completely (not used for filtering either)


  # ── filter-only rules (alert: false) ────────────────────────────────────────
  # These define what is worth tracking for analytics.
  # No webhook fired, no alert row written — pure filter + pass to analytics.
  # Use this pattern when you don't have an alert backend yet, or when the
  # rule's purpose is occupancy / dwell / trajectory tracking, not alerting.

  - name: track_persons_entrance
    class: person
    cameras: [cam-01]             # only applies to the entrance camera
    zones: [main_entrance]
    min_confidence: 0.75
    alert: false                  # filter-only — passes to dwell/occupancy analytics silently
    enabled: true

  - name: track_persons_parking
    class: person
    cameras: [cam-02]
    zones: [parking_zone_a, parking_entrance]
    min_confidence: 0.70
    alert: false
    enabled: true

  - name: track_vehicles_parking
    class: car
    cameras: [cam-02]
    zones: [parking_zone_a, parking_entrance]
    min_confidence: 0.70
    alert: false
    enabled: true


  # ── alert rules ─────────────────────────────────────────────────────────────
  # These fire a webhook and write an alert row in addition to passing the detection.
  # Use cooldown_seconds to avoid hammering your backend on every frame.

  - name: person_restricted_area
    class: person
    cameras: []                   # all cameras — restricted area rule applies everywhere
    zones: [server_room, back_office]
    min_confidence: 0.88
    cooldown_seconds: 15
    alert: true
    severity: critical
    alerts_table: "alerts"
    message: "Person detected in restricted area: {zone} on {camera}"
    enabled: true

  - name: truck_on_premises
    class: truck
    cameras: []                   # all cameras
    zones: []                     # any zone
    min_confidence: 0.70
    cooldown_seconds: 60
    alert: true
    severity: warning
    alerts_table: "alerts"
    message: "Truck detected on {camera} in {zone}"
    enabled: true


  # ── disabled rule (preserved for future use) ─────────────────────────────────

  - name: bicycle_anywhere
    class: bicycle
    cameras: []
    zones: []
    min_confidence: 0.70
    cooldown_seconds: 30
    alert: true
    severity: info
    alerts_table: "alerts"
    message: "Bicycle detected on {camera}"
    enabled: false
