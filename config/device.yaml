# For full field reference see config/config_sample/device.sample.yaml

device:
  id: ""
  name: ""
  location: ""
  environment: production   # production | development
  fps_target: 5
  max_cameras: 4
  log_level: INFO           # DEBUG | INFO | WARNING | ERROR
  heartbeat:
    enabled: true
    interval_seconds: 60
    table: "nodes"          # device health/pulse → nodes table

  health_file:
    enabled: false
    path: "/tmp/visionengine-edge-health.json"
    interval_seconds: 30

