device:
  id: ""
  name: ""
  location: ""
  environment: production   # production | development
  fps_target: 5
  max_cameras: 4
  log_level: INFO           # DEBUG | INFO | WARNING | ERROR

  heartbeat:
    enabled: true
    interval_seconds: 60
    table: "nodes"

  health_file:
    enabled: false
    path: "/tmp/visionengine-edge-health.json"
    interval_seconds: 30

  buffer:
    path: "./data/buffer.db"
    max_size_mb: 200
    retry_interval_seconds: 10
    delete_after_hours: 24

  analytics:
    raw: true
    dwell: false
    occupancy: false
    trajectory: false
    crossing: false
    tracker: "./config/botsort.yaml"
    dwell_table: ""
    occupancy_table: ""
    trajectory_table: ""
    dwell_timeout_seconds: 30
    trajectory_interval_seconds: 10
