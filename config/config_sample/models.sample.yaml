models:
  # ── model registry ──────────────────────────────────────────────────────────
  # Defines every model available on this device.
  # Cameras in cameras.yaml reference a model by its id.
  #
  # This file is the single source of truth for what each model can detect.
  # It does NOT define which camera uses which model — that is in cameras.yaml.
  # It does NOT define which classes to watch per camera — that is in cameras.yaml.
  #
  # Separation rule:
  #   models.yaml  → what the model IS CAPABLE of detecting (its full class list)
  #   cameras.yaml → what THIS CAMERA should actually watch (a subset filter)
  #
  # At startup the pipeline validates:
  #   - Every camera's model_id exists in this file
  #   - Every class listed on a camera exists in that model's classes list
  #   - A mismatch causes a clear startup error and the device will not run
  #     Example: "cam-02 lists class 'hardhat' but model 'vehicle_detector'
  #               only knows: car, truck, bus, motorcycle, bicycle"
  #
  # Fields:
  #
  #   id          Unique model identifier. Referenced by cameras.yaml.
  #               Convention: descriptive lowercase with underscores.
  #               Example: person_detector, vehicle_detector, general_coco
  #
  #   name        Human-readable label for logs and health reports.
  #
  #   version     Model version string. Shown in health reports so you can
  #               track which version is deployed on each device from the dashboard.
  #               Increment this when you retrain or update weights.
  #
  #   path        Path to the model weights file.
  #               Relative to the project root, or absolute.
  #               Convention: store all model files in ./models/
  #
  #               Supported formats:
  #                 .pt          PyTorch — works on all devices with torch
  #                 .onnx        ONNX — faster on CPU, no torch needed
  #                 .tflite      TensorFlow Lite — Raspberry Pi CPU optimised
  #                 .mlpackage   CoreML — Apple Neural Engine (Mac Mini M-series)
  #                 .hef         Hailo compiled — Hailo-8 / Hailo-8L hat only
  #
  #   device      Hardware accelerator to use for inference.
  #               auto     → detect best available at startup (recommended)
  #               cpu      → force CPU (slowest, works everywhere)
  #               cuda     → NVIDIA GPU (Jetson, desktop GPU)
  #               hailo    → Hailo-8 / Hailo-8L hat (Raspberry Pi)
  #               coreml   → Apple Neural Engine (Mac Mini M-series)
  #               mps      → Apple Metal (Mac Mini M-series, PyTorch)
  #
  #               Important: the model file format must match the device.
  #                 .hef requires device: hailo
  #                 .mlpackage requires device: coreml
  #                 .pt / .onnx work with: cpu, cuda, mps
  #
  #   classes     Full list of object classes this model can detect.
  #               These are the POSSIBLE outputs of this model — not a filter.
  #               Class names must match exactly what the model outputs.
  #
  #               For standard YOLOv8 / YOLO11 pretrained on COCO 80 classes:
  #                 person, bicycle, car, motorcycle, airplane, bus, train, truck,
  #                 boat, chair, bottle, cup, laptop, cell phone, and 66 more.
  #                 Full list: https://github.com/ultralytics/ultralytics/blob/main/ultralytics/cfg/datasets/coco.yaml
  #
  #               For custom fine-tuned models: use your training config class names.
  #
  #   confidence_threshold
  #               Discard detections below this score. Range 0.0 – 1.0.
  #               This is the model-level floor — rules in rules.yaml can set
  #               a HIGHER threshold per rule but never lower than this value.
  #               Individual cameras can also override this (see cameras.yaml).
  #
  #   iou_threshold
  #               Intersection over Union for Non-Maximum Suppression.
  #               Removes duplicate bounding boxes for the same object.
  #               Range 0.0 – 1.0. Lower = more aggressive deduplication.
  #               Recommended: 0.45. Rarely needs changing.
  #
  #   input_size  [width, height] in pixels. Frame is resized to this before inference.
  #               Must match what the model was trained with.
  #               Standard YOLO sizes: [320,320] (fast), [640,640] (balanced), [1280,1280] (accurate)


  # ── model 1: general purpose — full COCO pretrained ─────────────────────────
  # Use this for most deployments. Detects people, vehicles, and common objects.
  # No fine-tuning — straight pretrained weights.

  - id: general_coco
    name: "YOLOv8 General COCO"
    version: "1.0.0"
    path: "./models/yolov8n.pt"
    device: auto
    classes:
      - person
      - bicycle
      - car
      - motorcycle
      - bus
      - truck
    confidence_threshold: 0.5
    iou_threshold: 0.45
    input_size: [640, 640]


  # ── model 2: person-only fine-tuned ─────────────────────────────────────────
  # Fine-tuned on mall/indoor environments for person detection only.
  # Higher accuracy than general model for this specific use case.

  - id: person_detector
    name: "Person Detector — Mall Fine-Tuned"
    version: "1.0.0"
    path: "./models/person_mall_v1.pt"
    device: auto
    classes:
      - person
    confidence_threshold: 0.6
    iou_threshold: 0.45
    input_size: [640, 640]


  # ── model 3: vehicle-only ────────────────────────────────────────────────────
  # Optimised for outdoor parking and road scenes.

  - id: vehicle_detector
    name: "Vehicle Detector"
    version: "1.0.0"
    path: "./models/vehicle_v1.pt"
    device: auto
    classes:
      - car
      - truck
      - bus
      - motorcycle
      - bicycle
    confidence_threshold: 0.55
    iou_threshold: 0.45
    input_size: [640, 640]


  # ── model 4: Hailo compiled (Raspberry Pi + Hailo-8L hat) ───────────────────
  # Same weights as general_coco but compiled for the Hailo accelerator.
  # Only works on a Pi with the Hailo hat installed.
  # Provides 5–10× faster inference than CPU on the same Pi.

  - id: general_coco_hailo
    name: "YOLOv8 General COCO — Hailo"
    version: "1.0.0"
    path: "./models/yolov8n_hailo8l.hef"
    device: hailo
    classes:
      - person
      - bicycle
      - car
      - motorcycle
      - bus
      - truck
    confidence_threshold: 0.5
    iou_threshold: 0.45
    input_size: [640, 640]
