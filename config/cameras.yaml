cameras:
  - id: ""
    name: ""
    source:                   # 0 for USB | "rtsp://..." for IP camera | "/path/to/file.mp4"
    enabled: true
    fps_target: 5
    model_id: ""              # must match an id in models.yaml
    classes: []               # [] = all classes the model can detect
    confidence_threshold:     # leave empty to use model default
    raw_table: ""             # single table for all detections — use this OR routing, not both
